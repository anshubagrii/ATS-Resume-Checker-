name: Keep Render Alive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health check endpoint
        run: curl -sf https://ats-resume-checker-02d1.onrender.com//healthz || echo "Ping failed, app may be cold-starting"
